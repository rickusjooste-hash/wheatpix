  <rect x="87"  y="144" width="18" height="18" rx="3" fill="#6B3E06" opacity=".65"/>
  <!-- base -->
  <rect x="87"  y="166" width="18" height="18" rx="3" fill="#4A2A04" opacity=".45"/>
  <!-- glints -->
  <circle cx="96" cy="21"  r="3"   fill="#FFF8D0" opacity=".55"/>
  <circle cx="96" cy="87"  r="3.5" fill="#FFF8D0" opacity=".35"/>

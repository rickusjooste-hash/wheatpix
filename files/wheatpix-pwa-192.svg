    <line x1="172.8" y1="0" x2="172.8" y2="192"/>
  </g>
  <!-- pixel wheat — centered, px=18, gap=4 -->
  <!-- col centers: 78, 100, 122   row starts: y=12 step=22 -->
  <!-- tip -->
  <rect x="87" y="12"  width="18" height="18" rx="3" fill="url(#g)" opacity=".8"/>
  <!-- pair 1 -->
  <rect x="65" y="34"  width="18" height="18" rx="3" fill="url(#g)"/>
  <rect x="87" y="34"  width="18" height="18" rx="3" fill="url(#g)"/>
  <rect x="109" y="34" width="18" height="18" rx="3" fill="url(#g)"/>
  <!-- rachis -->
  <rect x="87" y="56"  width="18" height="18" rx="3" fill="#D4890A" opacity=".4"/>
  <!-- pair 2 widest -->
  <rect x="43"  y="78" width="18" height="18" rx="3" fill="url(#g)"/>
  <rect x="65"  y="78" width="18" height="18" rx="3" fill="url(#g)"/>
  <rect x="87"  y="78" width="18" height="18" rx="3" fill="url(#g)"/>
  <rect x="109" y="78" width="18" height="18" rx="3" fill="url(#g)"/>
  <rect x="131" y="78" width="18" height="18" rx="3" fill="url(#g)"/>
